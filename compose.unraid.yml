name: klug-media

services:
  klug-media:
    build:
      context: .
      dockerfile: Dockerfile
    image: klug-media:latest
    container_name: klug-media
    restart: unless-stopped
    env_file:
      - /mnt/user/appdata/klug-media/klug-media.env
    environment:
      APP_ENV: prod
      KLUG_HOST: 0.0.0.0
      KLUG_PORT: "8010"
      KLUG_RUN_MIGRATIONS: "true"
    ports:
      - "8010:8010"
    volumes:
      - /mnt/user/appdata/klug-media:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/api/v1/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
